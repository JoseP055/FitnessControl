<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="FitnessControl en entorno local conectado a FastAPI y Supabase."
    />
    <title>FitnessControl</title>
    <script>
      (function () {
        try {
          var raw = window.localStorage.getItem("fc.theme");
          if (!raw) return;
          var theme = JSON.parse(raw);
          if (theme.preset) {
            document.documentElement.setAttribute("data-theme", theme.preset);
          }
          if (theme.overrides) {
            Object.keys(theme.overrides).forEach(function (key) {
              document.documentElement.style.setProperty(key, theme.overrides[key]);
            });
          }
        } catch (error) {
          // Ignore malformed theme storage; default theme applies.
        }
      })();
    </script>
  </head>
  <body>
    <noscript>Necesitás JavaScript habilitado para usar FitnessControl.</noscript>
    <div id="root"></div>
  </body>
</html>
